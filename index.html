<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HISTORY ARCHIVE V5 - SMAN 10 SINJAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f4e4bc;
            --ink: #2c1e12;
            --gold: #b8860b;
            --correct: #2d5a27;
            --wrong: #8b0000;
            --border: #d2b48c;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { 
            background-color: #1a1a1a; 
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--ink); 
            font-family: 'Cormorant Garamond', serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            padding: 20px;
        }

        .container { width: 100%; max-width: 800px; }

        .manuscript { 
            background: var(--paper); 
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            border: 12px double var(--border); 
            border-radius: 5px; 
            padding: 40px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: none;
        }
        .active { display: block; animation: rollIn 0.8s ease; }

        @keyframes rollIn { from { transform: scaleY(0); opacity: 0; } to { transform: scaleY(1); opacity: 1; } }

        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 30px; }
        h1 { font-family: 'Cinzel', serif; font-size: 2rem; margin: 0; color: var(--gold); letter-spacing: 2px; }
        
        .meta-info { display: flex; justify-content: space-between; font-family: 'Cinzel', serif; font-size: 0.9rem; margin: 10px 0; }

        .question-box { font-size: 1.4rem; font-weight: 600; line-height: 1.4; margin-bottom: 25px; border-left: 4px solid var(--gold); padding-left: 15px; }

        .opt-list { display: grid; gap: 12px; }
        .option {
            background: rgba(0,0,0,0.03);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.1rem;
            position: relative;
        }
        .option:hover { background: rgba(184, 134, 11, 0.1); border-color: var(--gold); }
        .option.selected { background: rgba(184, 134, 11, 0.15); border: 1px solid var(--gold); font-weight: 600; }

        /* Feedback Colors */
        .ans-correct { background: var(--correct) !important; color: #fff !important; border-color: #1a3a16 !important; }
        .ans-wrong { background: var(--wrong) !important; color: #fff !important; border-color: #5a0000 !important; }

        .scroll-box {
            margin-top: 25px;
            padding: 20px;
            background: rgba(0,0,0,0.05);
            border: 1px dashed var(--gold);
            display: none;
            font-style: italic;
            line-height: 1.5;
            animation: fadeIn 0.5s ease;
        }

        .btn-action {
            width: 100%;
            padding: 18px;
            background: var(--ink);
            color: var(--paper);
            font-family: 'Cinzel', serif;
            font-weight: 700;
            border: none;
            cursor: pointer;
            margin-top: 30px;
            letter-spacing: 2px;
        }
        .btn-action:hover { background: var(--gold); color: var(--ink); }

        .progress-line { width: 100%; height: 3px; background: rgba(0,0,0,0.1); margin-bottom: 20px; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; }
    </style>
</head>
<body>

<div class="container">
    <div id="sc-start" class="manuscript active" style="text-align: center;">
        <h1 style="font-size: 3rem;">HISTORIA</h1>
        <p style="font-style: italic; margin-bottom: 40px;">Ujian Sejarah Indonesia & Dunia • SMAN 10 SINJAI</p>
        <button class="btn-action" onclick="startQuiz()">BUKA ARSIP SEJARAH</button>
    </div>

    <div id="sc-quiz" class="manuscript">
        <div class="header"><h1>HISTORIA ARCHIVE</h1></div>
        <div class="meta-info">
            <span id="q-label">ARCHIVE I</span>
            <span id="timer">00:00</span>
        </div>
        <div class="progress-line"><div id="p-fill" class="progress-fill"></div></div>
        
        <div id="content"></div>
        <div id="feedback" class="scroll-box"></div>
        
        <button id="btn-next" class="btn-action" onclick="processStep()">PERIKSA CATATAN</button>
    </div>

    <div id="sc-result" class="manuscript" style="text-align: center;">
        <h1>HASIL EVALUASI</h1>
        <div id="final-score" style="font-size: 5rem; font-family: 'Cinzel', serif; color: var(--gold); margin: 20px 0;">0</div>
        <p id="summary" style="margin-bottom: 30px; font-size: 1.2rem;"></p>
        <button class="btn-action" onclick="location.reload()">ULANGI SEJARAH</button>
    </div>
</div>

<script>
const questions = [
    { q: "Seorang sejarawan menemukan laporan pejabat kolonial (keamanan) dan babad lokal (keberanian). Kesimpulan yang paling tepat adalah...", opts: ["Isi selalu sama", "Keduanya pasti salah", "Berbeda karena tujuan penulisan tidak sama", "Babad lebih valid", "Laporan kolonial lebih objektif"], ans: 2, exp: "Sumber sejarah dipengaruhi sudut pandang, tujuan, dan kepentingan penulisnya." },
    { q: "Pernyataan (1) 'Pertempuran 10 Nov di Surabaya' & (2) 'Semangat heroik rakyat'. Mana yang merupakan interpretasi?", opts: ["(1) saja", "(2) saja", "(1) dan (2)", "Tidak keduanya", "Keduanya fakta murni"], ans: 1, exp: "Pernyataan (2) adalah penafsiran (interpretasi), sedangkan (1) adalah fakta waktu dan tempat." },
    { q: "Surat menyurat berubah jadi pesan instan, tapi fungsi komunikasi tetap ada. Fenomena ini disebut...", opts: ["Perubahan tanpa keberlanjutan", "Keberlanjutan tanpa perubahan", "Perubahan dan keberlanjutan sekaligus", "Stagnasi sosial", "Modernisasi total"], ans: 2, exp: "Bentuknya berubah (pesan instan), tetapi esensi fungsinya tetap ada (keberlanjutan)." },
    { q: "Ciri paling tepat dari historiografi tradisional Indonesia adalah...", opts: ["Analisis struktur sosial", "Kritis terhadap sumber", "Berpusat pada raja dan legitimasi", "Menggunakan statistik", "Menolak kepercayaan"], ans: 2, exp: "Historiografi tradisional umumnya bersifat istana-sentris dan bertujuan melegitimasi kekuasaan raja." },
    { q: "Dalam penelitian sejarah, tahap heuristik dilakukan ketika peneliti...", opts: ["Menulis kesimpulan", "Mengumpulkan sumber sejarah relevan", "Membandingkan teori", "Menyusun daftar pustaka", "Menilai benar-salah sumber"], ans: 1, exp: "Heuristik adalah langkah awal mencari dan menemukan sumber sejarah." },
    { q: "Menganalisis masyarakat Indonesia tahun 1928 tanpa membahas masa sebelum/sesudahnya menggunakan cara berpikir...", opts: ["Diakronik", "Sinkronik", "Kronologis", "Genealogis", "Periodisasi"], ans: 1, exp: "Sinkronik menelaah peristiwa pada satu kurun waktu tertentu secara meluas." },
    { q: "Tulisan sejarah menyebut abad ke-13 Sriwijaya sudah pakai telepon genggam. Kesalahan ini disebut...", opts: ["Simplifikasi", "Anachronisme", "Generalisasi", "Subjektivitas", "Periodisasi"], ans: 1, exp: "Anachronisme adalah kesalahan menempatkan objek/unsur yang tidak sesuai dengan zamannya." },
    { q: "Penelitian buruh pabrik abad ke-20 mengenai kondisi kerja dan hubungan kelas menggunakan pendekatan...", opts: ["Politik", "Ekonomi murni", "Sosial", "Biografis", "Diplomatik"], ans: 2, exp: "Pendekatan sosial menyoroti struktur masyarakat dan interaksi antarkelompok." },
    { q: "Perbedaan paling tepat antara kolonialisme dan imperialisme adalah...", opts: ["Eropa vs Asia", "Penguasaan wilayah vs perluasan kekuasaan luas", "Damai vs Perang", "Budaya vs Ekonomi", "Tidak ada beda"], ans: 1, exp: "Kolonialisme fokus pada pemukiman/penguasaan wilayah, imperialisme pada dominasi politik/ekonomi lebih luas." },
    { q: "Salah satu dampak penting Politik Etis di Indonesia adalah...", opts: ["Hilangnya pendidikan Barat", "Munculnya golongan terpelajar pribumi", "Berakhirnya eksploitasi", "Kemerdekaan penuh", "Tanah kembali ke pribumi"], ans: 1, exp: "Program edukasi Politik Etis melahirkan kaum intelektual yang nantinya memimpin pergerakan nasional." },
    // Tambahkan soal lainnya di sini hingga nomor 50 sesuai format ini...
    { q: "Pernyataan 1: Menjelang Proklamasi, Jepang kalah sehingga terjadi kekosongan kekuasaan. Pernyataan 2: Situasi dimanfaatkan pemimpin Indonesia mempercepat Proklamasi.", opts: ["Sebab-akibat Benar", "Benar tapi tidak berhubungan", "P1 Benar P2 Salah", "P1 Salah P2 Benar", "Keduanya Salah"], ans: 0, exp: "Kekalahan Jepang (Vacuum of Power) menjadi momentum kunci pelaksanaan proklamasi." }
];

let curIdx = 0, score = 0, time = 0, tActive = false, selected = -1;

function startQuiz() {
    document.getElementById('sc-start').classList.remove('active');
    document.getElementById('sc-quiz').classList.add('active');
    tActive = true;
    setInterval(() => { if(tActive) { time++; updateUI(); } }, 1000);
    renderQ();
}

function updateUI() {
    let m = Math.floor(time/60).toString().padStart(2,'0');
    let s = (time%60).toString().padStart(2,'0');
    document.getElementById('timer').innerText = `${m}:${s}`;
    document.getElementById('q-label').innerText = `ARCHIVE ${curIdx + 1}/${questions.length}`;
    document.getElementById('p-fill').style.width = `${((curIdx+1)/questions.length)*100}%`;
}

function renderQ() {
    const q = questions[curIdx], container = document.getElementById('content');
    let h = `<div class="question-box">${q.q}</div><div class="opt-list">`;
    q.opts.forEach((o, i) => {
        h += `<div class="option" id="opt-${i}" onclick="selectOpt(${i})">${o}</div>`;
    });
    h += `</div>`;
    container.innerHTML = h;
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('btn-next').innerText = "PERIKSA CATATAN";
    selected = -1;
}

function selectOpt(i) {
    if(document.getElementById('feedback').style.display === 'block') return;
    document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
    document.getElementById(`opt-${i}`).classList.add('selected');
    selected = i;
}

function processStep() {
    const btn = document.getElementById('btn-next');
    if(btn.innerText === "PERIKSA CATATAN") {
        if(selected === -1) return alert("Pilihlah satu jawaban terlebih dahulu!");
        validate();
        btn.innerText = (curIdx === questions.length - 1) ? "LIHAT HASIL AKHIR" : "ARSIP BERIKUTNYA";
    } else {
        if(curIdx < questions.length - 1) {
            curIdx++;
            renderQ();
            updateUI();
        } else {
            showResult();
        }
    }
}

function validate() {
    const q = questions[curIdx], opts = document.querySelectorAll('.option'), fb = document.getElementById('feedback');
    const correct = (selected === q.ans);
    
    // Menampilkan jawaban benar (Hijau)
    opts[q.ans].classList.add('ans-correct');
    
    if(!correct) {
        // Menampilkan jawaban salah (Merah)
        opts[selected].classList.add('ans-wrong');
    } else {
        score++;
    }

    fb.innerHTML = `<strong>ANALISIS: ${correct ? 'TEPAT' : 'KURANG TEPAT'}</strong><br>${q.exp}`;
    fb.style.display = 'block';
}

function showResult() {
    tActive = false;
    document.getElementById('sc-quiz').classList.remove('active');
    document.getElementById('sc-result').classList.add('active');
    const final = Math.round((score/questions.length)*100);
    document.getElementById('final-score').innerText = final;
    document.getElementById('summary').innerText = `Anda telah menelusuri ${questions.length} arsip sejarah dengan ${score} jawaban tepat.`;
}
</script>
</body>
</html>
