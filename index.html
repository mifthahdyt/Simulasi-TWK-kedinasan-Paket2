<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJOK EXAM - SMAN 10 SINJAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.02);
            --text-main: #ffffff;
            --text-dim: #999999;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --correct: #00ff64;
            --wrong: #ff3232;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 650px; }

        .card { background: var(--card-bg); backdrop-filter: blur(15px); padding: 35px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.5); display: none; }
        .card.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .timer { position: fixed; top: 20px; right: 20px; background: var(--accent); color: #000; padding: 8px 15px; border-radius: 10px; font-weight: 800; font-size: 0.9rem; z-index: 100; }
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }

        h2 { font-size: 1.1rem; line-height: 1.6; margin-bottom: 25px; font-weight: 500; text-align: left; }
        .badge { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 5px; display: block; }

        .opt-list { display: grid; gap: 10px; }
        .opt { padding: 16px 20px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 14px; text-align: left; }
        .opt:hover { background: rgba(255,255,255,0.08); }
        .opt.selected { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        
        /* State Colors */
        .opt.is-correct { background: rgba(0, 255, 100, 0.15) !important; border-color: var(--correct) !important; color: var(--correct); }
        .opt.is-wrong { background: rgba(255, 50, 50, 0.15) !important; border-color: var(--wrong) !important; color: var(--wrong); }

        input, textarea { width: 100%; padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 14px; outline: none; margin-top: 10px; }

        .btn { background: var(--accent); color: #000; padding: 18px; border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; width: 100%; margin-top: 25px; transition: 0.3s; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        .feedback-box { margin-top: 20px; padding: 20px; border-radius: 12px; font-size: 13px; display: none; line-height: 1.6; border-left: 4px solid #fff; }
        .visible { display: block; }

        #eval-list { text-align: left; margin-top: 20px; font-size: 13px; }
        .eval-item { border-bottom: 1px solid var(--border); padding: 15px 0; }
    </style>
</head>
<body>

<div id="timer-display" class="timer" style="display:none">00:00</div>

<div class="container">
    <div id="sc-start" class="card active" style="text-align: center;">
        <span class="badge">SMAN 10 SINJAI</span>
        <h1 style="font-size: 2.5rem; letter-spacing: -2px;">PJOK XII</h1>
        <p style="color: var(--text-dim); margin-bottom: 40px;">Ujian Akhir Semester Ganjil 2025/2026</p>
        <button class="btn" onclick="start()">Mulai Ujian Sekarang</button>
    </div>

    <div id="sc-quiz" class="card">
        <div class="progress-container"><div id="prog-fill" class="progress-fill"></div></div>
        <div id="quiz-content"></div>
        <div id="fdb" class="feedback-box"></div>
        <button id="btn-action" class="btn" onclick="handle()">Cek Jawaban</button>
    </div>

    <div id="sc-result" class="card" style="text-align: center;">
        <span class="badge">Final Score</span>
        <h1 id="score-val" style="font-size: 5rem; margin: 10px 0;">0</h1>
        <p id="time-val" style="color: var(--text-dim);"></p>
        <div id="eval-list"></div>
        <button class="btn" onclick="location.reload()">Ulangi</button>
    </div>
</div>

<script>
// DATABASE SOAL LENGKAP (37 NOMOR)
const db = [
    { type:'pg', q:"Pola pertahanan manakah yang paling efektif untuk meredam kecepatan lawan dengan formasi 4-3-3?", opts:["Man to man defense", "Counter attack", "Zone defense area flank", "Offside trap", "Total football"], ans:2, exp:"Zone defense fokus flank meredam sayap cepat." },
    { type:'pg', q:"Posisi ibu jari setelah bola terlepas (follow through) pada chest pass basket adalah...", opts:["Menghadap ke bawah", "Menghadap ke atas", "Saling bersentuhan", "Mengepal", "Menghadap ke samping"], ans:0, exp:"Ibu jari menghadap ke bawah." },
    { type:'pg', q:"Pemain voli bertahan yang tidak boleh smash atau servis disebut...", opts:["Setter", "Spiker", "Universal", "Libero", "Tosser"], ans:3, exp:"Libero adalah pemain spesialis defense." },
    { type:'pg', q:"Pukulan bulu tangkis tenaga penuh dan menukik tajam disebut...", opts:["Lob", "Smash", "Drive", "Drop shot", "Netting"], ans:1, exp:"Smash untuk mematikan lawan secara cepat." },
    { type:'pg', q:"Taktik paling bijak memajukan pelari base 1 & 2 saat tertinggal 1 angka (0 out) di sofbol?", opts:["Home run", "Steal", "Full swing", "Bunt (Sacrifice)", "Slide"], ans:3, exp:"Bunt digunakan untuk pengorbanan (sacrifice)." },
    { type:'pg', q:"Teknik silat memindahkan berat badan ke samping tanpa pindah kaki disebut...", opts:["Tangkisan", "Elakan samping", "Hindaran", "Kuda-kuda", "Pukulan"], ans:1, exp:"Elakan samping menghindari serangan tanpa langkah." },
    { type:'pg', q:"Urutan sistematika latihan yang benar adalah...", opts:["Pemanasan-Inti-Pendinginan", "Inti-Pemanasan-Pendinginan", "Pemanasan-Pendinginan-Inti"], ans:0, exp:"Urutan: Pemanasan, Inti, lalu Pendinginan." },
    { type:'pg', q:"Kesalahan yang sering terjadi saat melakukan guling lenting adalah...", opts:["Kaki lurus", "Tangan kuat", "Pinggul tidak melenting", "Mata tutup"], ans:2, exp:"Lentingan pinggul kunci utama gerakan." },
    { type:'pg', q:"Cara pengambilan napas yang benar pada renang gaya bebas adalah...", opts:["Ke depan", "Menunduk", "Menoleh ke samping", "Tahan napas"], ans:2, exp:"Kepala menoleh ke samping saat lengan di atas air." },
    { type:'pg', q:"Dampak jangka panjang rutin latihan aerobik pada kesehatan jantung adalah...", opts:["Nadi naik", "Nadi istirahat menurun", "Cepat lelah", "Otot mengecil"], ans:1, exp:"Jantung lebih efisien (nadi istirahat menurun)." },
    { type:'pg', q:"Langkah pertama menemukan orang tak sadar (henti jantung) sesuai POS RJP?", opts:["Memeriksa respon", "Napas buatan", "Kompresi", "Panggil ambulans"], ans:0, exp:"Periksa respon korban terlebih dahulu." },
    { type:'pg', q:"Dalam sepak bola, pemain dinyatakan offside jika...", opts:["Handsball", "Langgar kiper", "Dekat gawang dibanding bola & lawan kedua terakhir", "Keluar lapangan"], ans:2, exp:"Definisi offside menurut aturan FIFA." },
    { type:'pg', q:"Keuntungan utama formasi 4-2 dalam bola voli adalah...", opts:["Blok tinggi", "Banyak smasher", "Servis masuk", "Selalu ada 2 setter di depan", "Rapat"], ans:3, exp:"Memudahkan pengaturan serangan dengan 2 setter." },
    { type:'pg', q:"Pemain sofbol di belakang pemukul yang menangkap bola pitcher?", opts:["Batter", "Catcher", "Pitcher", "First base"], ans:1, exp:"Catcher (penangkap bola)." },
    { type:'pg', q:"Tujuan gizi seimbang bagi siswa aktif olahraga adalah...", opts:["Cepat kenyang", "Mengurangi berat", "Menambah lemak", "Energi & pemulihan otot", "Tren"], ans:3, exp:"Menjaga energi dan mempercepat pemulihan sel otot." },
    
    // KOMPLEKS (16-20)
    { type:'complex', q:"Prinsip Zone Defense (Pertahanan Daerah) basket yang benar? (Pilih >1)", opts:["Setiap pemain menjaga area tertentu", "Menjaga 1 lawan 1 ketat", "Hanya untuk menyerang", "Risiko foul individu berkurang"], ans:[0, 3], exp:"Jaga area dan mengurangi risiko pelanggaran individu." },
    { type:'complex', q:"Komponen fisik utama rancangan pola silat yang baik? (Pilih >1)", opts:["Kecepatan reaksi", "Kelincahan", "Kemalasan", "Keseimbangan", "Power"], ans:[0, 1, 3, 4], exp:"Reaksi, lincah, seimbang, dan power adalah kunci silat." },
    { type:'complex', q:"Gerakan pada fase pendinginan senam aerobik? (Pilih >1)", opts:["Peregangan statis", "Lompat tinggi", "Pernapasan dalam (lambat)", "Sprint"], ans:[0, 2], exp:"Pendinginan pakai peregangan statis dan napas lambat." },
    { type:'complex', q:"Kepanjangan dari prinsip FITT adalah? (Pilih >1)", opts:["Frequency", "Intensity", "Time", "Type", "Fast"], ans:[0, 1, 2, 3], exp:"Frequency, Intensity, Time, Type." },
    { type:'complex', q:"Kapan RJP boleh dihentikan? (Pilih >1)", opts:["Ahli medis tiba", "Korban sadar", "Penolong kelelahan", "Hujan"], ans:[0, 1, 2], exp:"Medis tiba, korban sadar, atau limit fisik penolong." },

    // MENJODOHKAN (21-30) - Disederhanakan untuk Mobile
    { type:'pg', q:"[Jodohkan] Istilah: Tembakan 2 langkah sambil melompat dalam basket?", opts:["Lay-up", "Netting", "Service Ace", "Handstand"], ans:0, exp:"Lay-up adalah teknik dasar basket." },
    { type:'pg', q:"[Jodohkan] Istilah: Pukulan poin langsung tanpa disentuh lawan?", opts:["Netting", "Service Ace", "Blocking", "Pivot"], ans:1, exp:"Service Ace membuahkan poin instan." },
    { type:'pg', q:"[Jodohkan] Istilah: Memukul bola bulu tangkis dekat dengan net?", opts:["Smash", "Lob", "Netting", "Drive"], ans:2, exp:"Netting menuntut kehalusan sentuhan." },
    { type:'pg', q:"[Jodohkan] Istilah: Berdiri dengan tangan di bawah kaki di atas?", opts:["Kopstand", "Handstand", "Roll", "Kayang"], ans:1, exp:"Handstand melatih kekuatan lengan." },
    { type:'pg', q:"[Jodohkan] Istilah: Gaya renang menyerupai gerakan katak?", opts:["Bebas", "Kupu-kupu", "Gaya Dada", "Punggung"], ans:2, exp:"Gaya dada sering disebut gaya katak." },
    { type:'pg', q:"[Jodohkan] Istilah: Sumber energi utama bagi atlet?", opts:["Karbohidrat", "Lemak", "Vitamin", "Serat"], ans:0, exp:"Karbohidrat adalah bahan bakar utama." },
    { type:'pg', q:"[Jodohkan] Istilah: Berputar dengan satu kaki sebagai poros (basket)?", opts:["Dribble", "Pivot", "Pass", "Screen"], ans:1, exp:"Pivot menjaga bola dari lawan." },
    { type:'pg', q:"[Jodohkan] Istilah: Membendung smash tepat di atas net voli?", opts:["Passing", "Service", "Blocking", "Set up"], ans:2, exp:"Blocking mematikan serangan lawan." },
    { type:'pg', q:"[Jodohkan] Istilah: Posisi skor sama kuat (misal 20-20)?", opts:["Jus", "Deuce", "Match", "Set"], ans:1, exp:"Deuce memerlukan selisih 2 poin." },
    { type:'pg', q:"[Jodohkan] Istilah: Posisi dasar kaki untuk keseimbangan silat?", opts:["Pukulan", "Tangkisan", "Kuda-kuda", "Kuncian"], ans:2, exp:"Kuda-kuda adalah fondasi silat." },

    // ISIAN & URAIAN (31-37)
    { type:'isian', q:"Strategi bertahan melawan center tinggi agar tidak rebound?", ans:"box out", exp:"Box out menghalangi lawan mendekat ke ring." },
    { type:'isian', q:"Sikap jika wasit memberikan keputusan yang salah adalah...", ans:"sportif", exp:"Sportivitas menghargai wasit." },
    { type:'isian', q:"Langkah penyelamatan teman kram di kolam dalam adalah pakai...", ans:"alat bantu", exp:"Utamakan keselamatan diri dengan alat bantu." },
    { type:'isian', q:"Kombinasi Karbo+Protein+Sayur terbaik untuk atlet?", ans:"nasi", exp:"Contoh: Nasi, Ayam, Sayur." },
    { type:'isian', q:"Tujuan kaki ditinggikan 20-30 cm saat pingsan adalah...", ans:"aliran darah", exp:"Membantu darah ke jantung dan otak." },
    { type:'uraian', q:"Analisis transisi counter attack yang efektif?", ans:"bebas", exp:"Rebut -> Oper Gelandang -> Through Pass Striker." },
    { type:'uraian', q:"Kampanye singkat anti sedentary lifestyle?", ans:"bebas", exp:"Ayo bergerak aktif & makan bergizi demi masa depan." }
];

let curr = 0, score = 0, time = 0, timerOn = false, wrongs = [];

function start() {
    document.getElementById('sc-start').classList.remove('active');
    document.getElementById('sc-quiz').classList.add('active');
    document.getElementById('timer-display').style.display = 'block';
    timerOn = true;
    setInterval(() => { if(timerOn){ time++; let m=Math.floor(time/60).toString().padStart(2,'0'), s=(time%60).toString().padStart(2,'0'); document.getElementById('timer-display').innerText=`${m}:${s}`;} }, 1000);
    render();
}

function render() {
    const q = db[curr], area = document.getElementById('quiz-content');
    document.getElementById('prog-fill').style.width = `${((curr+1)/db.length)*100}%`;
    let html = `<span class="badge">Nomor ${curr+1}</span><h2>${q.q}</h2>`;

    if(q.type === 'pg' || q.type === 'complex') {
        html += `<div class="opt-list">` + q.opts.map((o,i) => `<div class="opt" onclick="sel(${i},'${q.type}')">${o}</div>`).join('') + `</div>`;
    } else {
        html += `<input type="text" id="ans-in" placeholder="Ketik jawaban Anda...">`;
    }
    area.innerHTML = html;
    document.getElementById('fdb').classList.remove('visible');
    document.getElementById('btn-action').innerText = "Cek Jawaban";
}

function sel(i, type) {
    const opts = document.querySelectorAll('.opt');
    if(type === 'pg') opts.forEach(o => o.classList.remove('selected'));
    opts[i].classList.toggle('selected');
}

function handle() {
    const btn = document.getElementById('btn-action');
    if(btn.innerText === "CEK JAWABAN") {
        check();
        btn.innerText = "Lanjut Soal";
    } else {
        curr++;
        if(curr < db.length) render(); else finish();
    }
}

function check() {
    const q = db[curr], f = document.getElementById('fdb'), opts = document.querySelectorAll('.opt');
    let ok = false;

    if(q.type === 'pg') {
        let s = document.querySelector('.opt.selected');
        if(!s) return;
        let sIdx = Array.from(opts).indexOf(s);
        ok = (sIdx === q.ans);
        opts[q.ans].classList.add('is-correct');
        if(!ok) s.classList.add('is-wrong');
    } else if(q.type === 'complex') {
        let sels = Array.from(document.querySelectorAll('.opt.selected')).map(el => Array.from(opts).indexOf(el));
        ok = (JSON.stringify(sels.sort()) === JSON.stringify(q.ans.sort()));
        opts.forEach((o,i) => { if(q.ans.includes(i)) o.classList.add('is-correct'); else if(sels.includes(i)) o.classList.add('is-wrong'); });
    } else if(q.type === 'isian') {
        ok = document.getElementById('ans-in').value.toLowerCase().includes(q.ans);
    } else { ok = true; }

    if(ok) { score += Math.round(100/db.length); f.style.borderColor = "#00ff64"; f.style.color = "#00ff64"; }
    else { wrongs.push({q: q.q, k: q.exp}); f.style.borderColor = "#ff3232"; f.style.color = "#ff3232"; }

    f.innerHTML = `<strong>${ok ? 'BENAR' : 'SALAH'}</strong><br>${q.exp}`;
    f.classList.add('visible');
}

function finish() {
    timerOn = false;
    document.getElementById('sc-quiz').classList.remove('active');
    document.getElementById('sc-result').classList.add('active');
    document.getElementById('score-val').innerText = score > 100 ? 100 : score;
    document.getElementById('time-val').innerText = "Waktu Pengerjaan: " + document.getElementById('timer-display').innerText;
    document.getElementById('eval-list').innerHTML = `<h3 style="border-bottom:1px solid #333; padding-bottom:10px;">Evaluasi Jawaban Salah:</h3>` + wrongs.map(w => `<div class="eval-item"><b>${w.q}</b><br><span style="color:#777;">Pembahasan: ${w.k}</span></div>`).join('');
}
</script>
</body>
</html>
