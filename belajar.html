<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try Out PKN - Bahan Bakar Semangat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e74c3c;
            --secondary: #ff7675;
            --accent: #f1c40f;
            --bg: #fdf2f2;
            --white: #ffffff;
            --dark: #2c3e50;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            margin: 0;
            background: linear-gradient(135deg, #c0392b, #e74c3c, #fab1a0);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { width: 100%; max-width: 600px; }

        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
            display: none;
            position: relative;
            border: 2px solid white;
        }

        .card.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 { font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        
        .fuel-badge {
            background: var(--accent);
            color: #7d6608;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.85rem;
            display: inline-block;
            margin: 15px 0;
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.4);
        }

        /* Styling Timer */
        .timer-badge {
            position: absolute;
            top: 20px;
            right: 25px;
            background: var(--dark);
            color: white;
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 12px;
        }

        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(231, 76, 60, 0.3); }

        .option-container { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        .option-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 15px;
            border-radius: 15px;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn:hover { border-color: var(--primary); }
        .option-btn.selected { background: var(--primary); color: white; }
        .option-btn.correct { background: #c6f6d5 !important; color: #1a531b !important; border-color: #2ecc71 !important; }
        .option-btn.wrong { background: #fed7d7 !important; color: #822727 !important; border-color: #e74c3c !important; }

        .explanation-box {
            background: #fff9db;
            padding: 15px;
            border-radius: 15px;
            text-align: left;
            border-left: 6px solid var(--accent);
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .hidden { display: none; }
        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: 0.3s; }
        #evaluation-list { text-align: left; max-height: 250px; overflow-y: auto; margin-top: 20px; padding: 10px; background: #f8f9fa; border-radius: 15px; }
        .eval-item { border-bottom: 1px solid #ddd; padding: 10px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <div id="screen-welcome" class="card active">
            <div class="fuel-badge">🇮🇩 TRY OUT PKN 🔥</div>
            <h1>Halo, Miftha! 👋</h1>
            <p>Siap menaklukkan 50 soal PKN?</p>
            <p style="font-style: italic; color: #666; margin-top: -10px; font-size: 0.8rem;">"Gunakan Bahan Bakar Semangatmu!"</p>
            <button class="btn btn-main" onclick="startQuiz()">Mulai Try Out ⚖️</button>
        </div>

        <div id="screen-quiz" class="card">
            <div class="timer-badge" id="display-timer">00:00</div>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: bold; color: #999; margin-bottom: 10px;">
                <span>TRY OUT PKN</span>
                <span id="label-count">1/50</span>
            </div>
            <p id="text-question" style="font-weight: 600; text-align: left; font-size: 1.1rem;"></p>
            <div id="container-options" class="option-container"></div>
            
            <div id="feedback-area" class="hidden">
                <div class="explanation-box">
                    <strong>💡 Pembahasan:</strong>
                    <p id="text-explanation" style="margin-top: 5px;"></p>
                </div>
                <button class="btn btn-main" style="margin-top: 15px;" onclick="nextQuestion()">Lanjut ➡️</button>
            </div>
            <button id="btn-submit" class="btn btn-main hidden" onclick="checkAnswer()">Cek Jawaban ✅</button>
        </div>

        <div id="screen-result" class="card">
            <h1>Hasil Akhir 🏆</h1>
            <div style="font-size: 4rem; font-weight: 800; color: var(--primary);" id="final-score">0</div>
            <p style="font-weight: bold; margin-bottom: 5px;">Waktu Pengerjaan: <span id="finish-time" style="color: var(--dark);">00:00</span></p>
            <div class="fuel-badge" id="motivation-text">BAHAN BAKAR SEMANGATMU! 🔥</div>
            <div id="evaluation-list"></div>
            <button class="btn btn-main" style="margin-top: 20px;" onclick="location.reload()">Ulangi 🔄</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "1. Pembagian kekuasaan yang membagi fungsi lembaga menjadi legislatif, eksekutif, dan yudikatif disebut...", opts: ["Vertikal", "Horizontal", "Diagonal", "Federal", "Komunal"], ans: 1, exp: "Horizontal berarti dilakukan antarlembaga yang sejajar." },
            { q: "2. Nilai Pancasila yang berkaitan dengan pengakuan kedudukan manusia yang sederajat adalah sila ke...", opts: ["1", "2", "3", "4", "5"], ans: 1, exp: "Sila ke-2 menekankan Kemanusiaan yang adil dan beradab." },
            { q: "3. Kekuasaan untuk mengubah dan menetapkan UUD dijalankan oleh...", opts: ["Presiden", "DPR", "MPR", "MA", "MK"], ans: 2, exp: "MPR berwenang mengubah dan menetapkan UUD." },
            { q: "4. Wilayah laut Indonesia sejauh 200 mil laut untuk eksploitasi alam disebut...", opts: ["Laut Teritorial", "Zona Tambahan", "Landas Kontinen", "ZEE", "Laut Pedalaman"], ans: 3, exp: "ZEE memberikan hak berdaulat atas sumber daya laut hingga 200 mil." },
            { q: "5. Jaminan memeluk agama dalam UUD 1945 terdapat pada Pasal...", opts: ["27 Ayat 1", "28", "29 Ayat 2", "30 Ayat 1", "31 Ayat 1"], ans: 2, exp: "Pasal 29 ayat 2 menjamin kemerdekaan tiap penduduk beragama." },
            { q: "6. Salah satu faktor eksternal penyebab pelanggaran HAM adalah...", opts: ["Sikap egois", "Rendahnya kesadaran HAM", "Penyalahgunaan kekuasaan", "Sikap tidak toleran", "Kurangnya empati"], ans: 2, exp: "Penyalahgunaan kekuasaan berasal dari sistem luar diri individu." },
            { q: "7. Instrumen hukum pertama di Indonesia yang mengatur khusus tentang HAM adalah...", opts: ["UU No. 39 Tahun 1999", "UU No. 26 Tahun 2000", "UU No. 12 Tahun 2006", "Tap MPR No. XVII/1998", "UUD 1945 Pasal 28"], ans: 3, exp: "Tap MPR No. XVII/1998 adalah tonggak awal peraturan khusus HAM." },
            { q: "8. Demokrasi Indonesia bersumber dari tata nilai sosial budaya bangsa, yaitu...", opts: ["Liberal", "Rakyat", "Pancasila", "Terpimpin", "Parlementer"], ans: 2, exp: "Demokrasi Pancasila berakar pada kekeluargaan bangsa." },
            { q: "9. Sistem hukum di Indonesia secara dominan bersifat...", opts: ["Anglosaxon", "Common Law", "Civil Law", "Hukum Adat", "Hukum Agama"], ans: 2, exp: "Indonesia menganut Civil Law yang mengutamakan hukum tertulis." },
            { q: "10. Lembaga peradilan tertinggi yang membawahi semua lingkungan peradilan adalah...", opts: ["MK", "KY", "MA", "PT", "PN"], ans: 2, exp: "MA adalah puncak peradilan umum, agama, militer, dan TUN." },
            { q: "11. Kerja sama internasional sangat penting karena...", opts: ["Ingin menguasai", "Negara saling membutuhkan", "Cari untung", "Blok militer", "Hilangkan identitas"], ans: 1, exp: "Interdependensi membuat negara harus bekerja sama." },
            { q: "12. Landasan konstitusional politik luar negeri bebas aktif adalah...", opts: ["Pancasila", "Pembukaan UUD 1945 Alinea 4", "Kepres", "Tap MPR", "Permenlu"], ans: 1, exp: "Tertuang dalam Pembukaan UUD 1945 alinea 4." },
            { q: "13. Ancaman militer berupa perusakan instalasi penting disebut...", opts: ["Spionase", "Agresi", "Sabotase", "Pemberontakan", "Pelanggaran"], ans: 2, exp: "Sabotase merusak objek vital nasional." },
            { q: "14. Persatuan bangsa dijaga untuk mencegah...", opts: ["Integrasi", "Disintegrasi", "Akulturasi", "Asimilasi", "Koalisi"], ans: 1, exp: "Disintegrasi adalah perpecahan bangsa." },
            { q: "15. Wewenang memutus sengketa hasil pemilu berada pada...", opts: ["KPU", "Bawaslu", "MA", "MK", "Presiden"], ans: 3, exp: "Kewenangan Mahkamah Konstitusi sesuai UUD 1945." },
            { q: "16. Kewajiban warga negara menurut Pasal 30 UUD 1945 adalah...", opts: ["Pendidikan", "Pajak", "Pertahanan Keamanan", "Hukum", "Budaya"], ans: 2, exp: "Pasal 30 fokus pada bela negara." },
            { q: "17. Mengabaikan kewajiban yang ditetapkan hukum disebut...", opts: ["Pelanggaran hak", "Pengingkaran kewajiban", "Kejahatan", "Kriminal", "Penyelewengan"], ans: 1, exp: "Saat tidak melakukan apa yang diwajibkan hukum." },
            { q: "18. Faktor internal pendorong pelanggaran HAM adalah...", opts: ["Aparat tidak tegas", "Teknologi", "Kesenjangan", "Sikap egois", "Sistem lemah"], ans: 3, exp: "Egoisme berasal dari kondisi psikologis pelaku." },
            { q: "19. Unsur mutlak berdirinya negara secara de jure adalah...", opts: ["Rakyat", "Wilayah", "Pemerintah", "Pengakuan negara lain", "Tentara"], ans: 3, exp: "Secara hukum, pengakuan internasional sangat menentukan." },
            { q: "20. Peran polisi dalam menjamin keadilan adalah...", opts: ["Menuntut", "Memutus", "Penyidikan", "Menguji UU", "Bantuan"], ans: 2, exp: "Polri bertugas melakukan penyelidikan dan penyidikan." },
            { q: "21. Keberagaman Indonesia menjadi kekuatan karena...", opts: ["Konflik", "Nikah beda suku", "Rukun", "Kompetensi", "Rujukan multikulturalisme"], ans: 4, exp: "Indonesia adalah model dunia tentang persatuan." },
            { q: "22. Musyawarah mufakat adalah pengamalan sila ke...", opts: ["1", "2", "3", "4", "5"], ans: 3, exp: "Sila ke-4 fokus pada musyawarah." },
            { q: "23. Contoh sila ke-5 di masyarakat adalah...", opts: ["Hormat agama", "Musyawarah", "Kesempatan sama bagi warga", "Toleransi", "Hidup rukun"], ans: 2, exp: "Keadilan sosial berarti tidak diskriminatif." },
            { q: "24. Hak mendapatkan status kewarganegaraan adalah hak...", opts: ["Ekonomi", "Politik", "Hukum", "Sosial", "Pribadi"], ans: 2, exp: "Berkaitan dengan kepastian status hukum." },
            { q: "25. Pengaruh positif iptek bagi ekonomi adalah...", opts: ["Hukum", "Meningkatkan investasi", "Konsumtif", "Kesenjangan", "Demokratisasi"], ans: 1, exp: "Teknologi memudahkan aliran modal asing." },
            { q: "26. Pengaruh negatif iptek dalam sosial budaya adalah...", opts: ["Transparansi", "Efisiensi", "Hedonisme", "Mudah info", "Pasar"], ans: 2, exp: "Gaya hidup mewah yang menggeser nilai lokal." },
            { q: "27. Sikap menghadapi iptek sesuai Pancasila adalah...", opts: ["Terima saja", "Menolak", "Selektif dan kritis", "Menutup diri", "Ikut tren"], ans: 2, exp: "Menyaring yang sesuai jati diri bangsa." },
            { q: "28. Kekuasaan Kejaksaan dalam sistem hukum adalah...", opts: ["Penuntut umum", "Pemutus", "Penyidik tunggal", "Pengaman", "Pembuat UU"], ans: 0, exp: "Jaksa bertugas melakukan penuntutan." },
            { q: "29. Penganiayaan termasuk pelanggaran HAM kategori...", opts: ["Berat", "Ringan", "Internasional", "Politik", "Ekonomi"], ans: 1, exp: "Pelanggaran berat contohnya genosida." },
            { q: "30. Bhinneka Tunggal Ika artinya...", opts: ["Berbeda tetap satu", "Bersatu teguh", "Hikmat", "Persatuan", "Keadilan"], ans: 0, exp: "Sudah sangat jelas." },
            { q: "31. Asas kewarganegaraan berdasarkan tempat lahir adalah...", opts: ["Ius Sanguinis", "Ius Soli", "Apatride", "Bipatride", "Naturalisasi"], ans: 1, exp: "Ius Soli = Hukum tanah kelahiran." },
            { q: "32. Pembukaan UUD 1945 berkedudukan sebagai...", opts: ["Batang tubuh", "Pokok kaidah fundamental", "Aturan tambahan", "Penjelasan", "Dokumen"], ans: 1, exp: "Sebagai Staatfundamentalnorm." },
            { q: "33. Ciri utama negara demokrasi adalah...", opts: ["Tentara kuat", "Presiden absolut", "Keterlibatan rakyat", "Partai tunggal", "Ekonomi tutup"], ans: 2, exp: "Kedaulatan di tangan rakyat." },
            { q: "34. Contoh sila ke-1 di masyarakat adalah...", opts: ["Kebersihan", "Hormat ibadah lain", "Musyawarah", "Adil", "Taat"], ans: 1, exp: "Inti toleransi beragama." },
            { q: "35. Sikap berpancasila dalam globalisasi adalah...", opts: ["Tolak", "Terima semua", "Saring budaya", "Tiru gaya maju", "Anggap kuno"], ans: 2, exp: "Menyaring nilai asing." },
            { q: "36. Hubungan luar negeri dua negara disebut...", opts: ["Multilateral", "Regional", "Bilateral", "Internasional", "Nasional"], ans: 2, exp: "Bilateral (Dua pihak)." },
            { q: "37. Landasan idiil persatuan adalah...", opts: ["UUD 1945", "Pancasila", "Kebijakan", "Perda", "Konvensi"], ans: 1, exp: "Ideologi bangsa adalah Pancasila." },
            { q: "38. Menyontek adalah pengingkaran kewajiban di...", opts: ["Rumah", "Sekolah", "Masyarakat", "Bangsa", "Negara"], ans: 1, exp: "Konteks dunia pendidikan." },
            { q: "39. Perlindungan hukum diberikan kepada...", opts: ["Si kaya", "Aparat", "Seluruh warga", "WNA", "Pelaku"], ans: 2, exp: "Persamaan di mata hukum." },
            { q: "40. Contoh ancaman non-militer ekonomi adalah...", opts: ["Agresi", "Siber", "Globalisasi tidak adil", "Pemberontakan", "Spionase"], ans: 2, exp: "Persaingan pasar yang tidak sehat." },
            { q: "41. Tujuan utama penegakan hukum adalah...", opts: ["Bikin takut", "Denda", "Keadilan, Kepastian, Kemanfaatan", "Lindungi pejabat", "Cari denda"], ans: 2, exp: "Tiga nilai dasar hukum." },
            { q: "42. Nilai praksis Pancasila adalah...", opts: ["Teks UUD", "Abstrak", "Realisasi sehari-hari", "Masa lalu", "Budaya asing"], ans: 2, exp: "Penerapan nyata di lapangan." },
            { q: "43. Lembaga menangani pelanggaran HAM adalah...", opts: ["KPK", "Komnas HAM", "BPK", "KPU", "Ombudsman"], ans: 1, exp: "Komisi Nasional HAM." },
            { q: "44. Hak berpendapat diatur dalam...", opts: ["UU No. 9 Tahun 1998", "UU No. 20", "UU No. 12", "UU No. 17", "UU No. 2"], ans: 0, exp: "UU tentang kemerdekaan berpendapat." },
            { q: "45. NKRI adalah singkatan dari...", opts: ["Negara Rakyat", "Negara Kesatuan Republik Indonesia", "Kedaulatan", "Keadilan", "Rakyat"], ans: 1, exp: "Nama resmi negara kita." },
            { q: "46. Tidak mengambil milik orang lain sesuai sila...", opts: ["1", "2", "3", "4", "5"], ans: 4, exp: "Keadilan sosial (hak milik)." },
            { q: "47. Contoh perilaku keadilan sosial adalah...", opts: ["Hormat agama", "Kesempatan belajar sama", "Kerja bakti", "Taat", "Hargai pendapat"], ans: 1, exp: "Pemerataan akses pendidikan." },
            { q: "48. Peluang Indonesia di globalisasi karena...", opts: ["Penduduk & SDA", "Tidak ada saingan", "Tergantung", "Kurang tenaga", "Minim kerja sama"], ans: 0, exp: "Potensi pasar dan alam." },
            { q: "49. Tantangan sosial budaya globalisasi adalah...", opts: ["Peduli daerah", "Budaya asing geser lokal", "Kearifan lokal", "Rasa bangsa", "Seni tradisional"], ans: 1, exp: "Ancaman identitas budaya." },
            { q: "50. Miftha, apa janji yang harus kamu pegang teguh untuk masa depanmu?", opts: ["Saya akan menyerah jika sulit.", "Saya akan belajar biasa saja.", "Saya akan berjuang habis-habisan demi mimpi saya!", "Saya akan menunda-nunda pekerjaan.", "Saya tidak peduli masa depan."], ans: 2, exp: "Mental juara tidak pernah menyerah. Berjuanglah demi mimpi dan janji pada dirimu sendiri!" }
        ];

        let currentIdx = 0;
        let score = 0;
        let wrongAnswers = [];
        let selectedIdx = -1;
        
        // Timer Logic
        let timerInterval;
        let seconds = 0;

        function startQuiz() {
            document.getElementById('screen-welcome').classList.remove('active');
            document.getElementById('screen-quiz').classList.add('active');
            startTimer();
            loadQuestion();
        }

        function startTimer() {
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('display-timer').innerText = formatTime(seconds);
            }, 1000);
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function loadQuestion() {
            const data = questions[currentIdx];
            document.getElementById('label-count').innerText = `${currentIdx + 1}/50`;
            document.getElementById('text-question').innerText = data.q;
            document.getElementById('progress-fill').style.width = `${((currentIdx + 1)/50)*100}%`;
            
            const container = document.getElementById('container-options');
            container.innerHTML = '';
            data.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    selectedIdx = i;
                    document.querySelectorAll('.option-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
                    document.getElementById('btn-submit').classList.remove('hidden');
                };
                container.appendChild(btn);
            });
            document.getElementById('feedback-area').classList.add('hidden');
            document.getElementById('btn-submit').classList.add('hidden');
        }

        function checkAnswer() {
            const data = questions[currentIdx];
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.onclick = null);
            
            if(selectedIdx === data.ans) {
                btns[selectedIdx].classList.add('correct');
                score += 2;
            } else {
                btns[selectedIdx].classList.add('wrong');
                btns[data.ans].classList.add('correct');
                wrongAnswers.push({ q: data.q, user: data.opts[selectedIdx], correct: data.opts[data.ans] });
            }
            document.getElementById('text-explanation').innerText = data.exp;
            document.getElementById('feedback-area').classList.remove('hidden');
            document.getElementById('btn-submit').classList.add('hidden');
        }

        function nextQuestion() {
            currentIdx++;
            if(currentIdx < 50) loadQuestion();
            else {
                clearInterval(timerInterval); // Stop timer
                showResult();
            }
        }

        function showResult() {
            document.getElementById('screen-quiz').classList.remove('active');
            document.getElementById('screen-result').classList.add('active');
            document.getElementById('final-score').innerText = score;
            document.getElementById('finish-time').innerText = formatTime(seconds);
            
            const motivationText = document.getElementById('motivation-text');
            const resultTitle = document.querySelector('#screen-result h1');

            if (score === 100) {
                resultTitle.innerText = "Sempurna, Miftha! 🏆";
                motivationText.innerText = "KAMU ADALAH JUARA SEJATI! 🔥";
            } else if (score >= 80) {
                resultTitle.innerText = "Hebat, Miftha! 👍";
                motivationText.innerText = "DIKIT LAGI PERFECT, GAS TERUS! 🔥";
            } else {
                resultTitle.innerText = "Ayo, Miftha! 💪";
                motivationText.innerText = "JANGAN MENYERAH, BELAJAR LAGI! 🔥";
            }

            const list = document.getElementById('evaluation-list');
            list.innerHTML = "";
            if(wrongAnswers.length === 0) list.innerHTML = "<p style='color: #27ae60; font-weight: bold;'>Luar biasa, Miftha! PKN kamu sempurna! 🇮🇩</p>";
            else {
                list.innerHTML = "<p style='font-weight: 600; text-align: left;'>📋 Evaluasi Jawaban Salah:</p>";
                wrongAnswers.forEach(w => {
                    list.innerHTML += `<div class="eval-item"><b>${w.q}</b><br>Kamu: <span style='color: #e74c3c;'>${w.user}</span> | Benar: <span style='color: #27ae60; font-weight: bold;'>${w.correct}</span></div>`;
                });
            }
        }
    </script>
</body>
</html>
